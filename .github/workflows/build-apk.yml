name: Build Sideloadable APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: recon-radar-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK info
        run: |
          ls -lh app/build/outputs/apk/debug/
          echo ""
          echo "=== Sideload instructions ==="
          echo "1. Enable Developer Options on Samsung S24"
          echo "   Settings → About Phone → tap Build Number 7×"
          echo "2. Enable USB Debugging"
          echo "   Settings → Developer Options → USB Debugging"
          echo "3. Install via ADB:"
          echo "   adb install app/build/outputs/apk/debug/app-debug.apk"
          echo ""
          echo "OR copy the APK to your phone and tap to install"
          echo "(requires 'Install unknown apps' enabled for your file manager)"
